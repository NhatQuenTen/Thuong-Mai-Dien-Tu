<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý đơn hàng</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .page-title {
        margin: 0 0 8px;
        color: #f8fafc;
      }

      .page-subtitle {
        margin: 0 0 18px;
        color: #94a3b8;
      }

      .card {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 18px;
      }

      .status-line {
        min-height: 18px;
        font-size: 13px;
        color: #93c5fd;
        margin-bottom: 10px;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1180px;
        color: #f8fafc;
      }

      th,
      td {
        border: 1px solid #334155;
        padding: 10px 8px;
        text-align: center;
        vertical-align: top;
        font-size: 14px;
      }

      th {
        background: #1e293b;
        color: #e2e8f0;
        white-space: nowrap;
      }

      .customer-cell {
        text-align: left;
        min-width: 200px;
      }

      .customer-name {
        font-weight: 700;
        color: #f8fafc;
        margin-bottom: 4px;
      }

      .customer-meta {
        display: block;
        font-size: 12px;
        color: #94a3b8;
        line-height: 1.4;
      }

      .order-code {
        font-family: Consolas, monospace;
        color: #fde68a;
        white-space: nowrap;
      }

      .items-cell {
        text-align: left;
        min-width: 280px;
      }

      .items-list {
        margin: 0;
        padding-left: 18px;
      }

      .items-list li {
        margin-bottom: 4px;
        color: #cbd5e1;
        line-height: 1.35;
      }

      .total-price {
        color: #86efac;
        font-weight: 700;
        white-space: nowrap;
      }

      .payment-info {
        text-align: left;
        min-width: 170px;
        line-height: 1.4;
      }

      .payment-method {
        font-weight: 600;
        color: #f8fafc;
        display: block;
        margin-bottom: 4px;
      }

      .payment-status {
        font-size: 12px;
        color: #cbd5e1;
        background: #1e293b;
        border: 1px solid #334155;
        display: inline-block;
        border-radius: 999px;
        padding: 2px 10px;
      }

      .status-select {
        width: 180px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f172a;
        color: #f8fafc;
        font-size: 13px;
      }

      .empty-row td {
        color: #94a3b8;
        padding: 28px 12px;
        text-align: center;
      }

      .updated-at {
        font-size: 12px;
        color: #94a3b8;
        margin-top: 8px;
      }

      .toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 9999;
        padding: 12px 14px;
        border-radius: 10px;
        color: #fff;
        background: #16a34a;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.25s ease,
          transform 0.25s ease;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.error {
        background: #dc2626;
      }

      .filter-bar {
        margin-bottom: 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid #334155;
      }

      .filter-bar label {
        color: #e2e8f0;
        font-weight: 500;
        white-space: nowrap;
      }

      .filter-bar select {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f172a;
        color: #f8fafc;
        font-size: 14px;
        cursor: pointer;
        flex: 1;
        max-width: 300px;
      }

      .filter-bar select:hover {
        border-color: #475569;
      }

      .filter-bar select:focus {
        outline: none;
        border-color: #fde68a;
        box-shadow: 0 0 0 2px rgba(253, 230, 138, 0.1);
      }

      .filter-result {
        font-size: 12px;
        color: #94a3b8;
        margin-left: auto;
        white-space: nowrap;
      }

      @media (max-width: 900px) {
        .status-select {
          width: 150px;
        }
        .filter-bar {
          flex-wrap: wrap;
        }
        .filter-bar select {
          max-width: 100%;
        }
        .filter-result {
          margin-left: 0;
          width: 100%;
          margin-top: 8px;
        }
      }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  </head>
  <body>
    <div class="sidebar">
      <h2>MobiStore Admin</h2>
      <a href="admin.html">Dashboard</a>
      <a href="products.html">Sản phẩm</a>
      <a class="active" href="orders.html">Đơn hàng</a>
      <a href="users.html">Người dùng</a>
    </div>

    <div class="main">
      <h1 class="page-title">Quản lý đơn hàng</h1>
      <p class="page-subtitle">
        Đồng bộ realtime từ Firestore, cập nhật trạng thái để user theo dõi ngay
        trên lịch sử mua hàng.
      </p>

      <div class="card">
        <div id="statusLine" class="status-line">
          Đang tải đơn hàng từ Firebase...
        </div>
        <div class="filter-bar">
          <label>Lọc theo trạng thái:</label>
          <select id="statusFilter" onchange="filterOrdersByStatus()">
            <option value="">Tất cả đơn hàng</option>
            <option value="Chờ xác nhận">Chờ xác nhận</option>
            <option value="Đã xác nhận">Đã xác nhận</option>
            <option value="Đang giao hàng">Đang giao hàng</option>
            <option value="Đã giao hàng thành công">
              Đã giao hàng thành công
            </option>
            <option value="Đã hủy">Đã hủy</option>
          </select>
          <div id="filterResult" class="filter-result"></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>STT</th>
                <th>Mã đơn</th>
                <th>Tài khoản đặt</th>
                <th>Ngày đặt</th>
                <th>Thanh toán</th>
                <th>Trạng thái</th>
                <th>Sản phẩm</th>
                <th>Tổng tiền</th>
              </tr>
            </thead>
            <tbody id="ordersBody">
              <tr class="empty-row">
                <td colspan="8">Đang tải dữ liệu...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div id="updatedAt" class="updated-at"></div>
      </div>
    </div>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDzQyH_VLOeuO8Q0bvuFVZ2uPPP9uShR6c",
        authDomain: "myteamproject-36c2f.firebaseapp.com",
        projectId: "myteamproject-36c2f",
        storageBucket: "myteamproject-36c2f.firebasestorage.app",
        messagingSenderId: "790145988623",
        appId: "1:790145988623:web:112b090cd32a4c28dd4b7a",
      };

      const STATUS_OPTIONS = [
        "Chờ xác nhận",
        "Đã xác nhận",
        "Đang giao hàng",
        "Đã giao hàng thành công",
        "Đã hủy",
      ];

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      const statusLine = document.getElementById("statusLine");
      const updatedAtText = document.getElementById("updatedAt");
      const ordersBody = document.getElementById("ordersBody");
      const statusFilter = document.getElementById("statusFilter");
      const filterResult = document.getElementById("filterResult");
      let allOrders = [];

      function showStatus(message, isError = false) {
        statusLine.textContent = message;
        statusLine.style.color = isError ? "#fca5a5" : "#93c5fd";
      }

      function getPermissionErrorMessage(error, fallback) {
        if (error?.code === "permission-denied") {
          return "Bạn không có quyền đọc đơn hàng. Hãy đăng nhập tài khoản admin.";
        }
        return fallback;
      }

      function showToast(message, isError = false) {
        const oldToast = document.querySelector(".toast");
        if (oldToast) oldToast.remove();

        const toast = document.createElement("div");
        toast.className = "toast" + (isError ? " error" : "");
        toast.textContent = message;
        document.body.appendChild(toast);

        requestAnimationFrame(() => toast.classList.add("show"));
        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 250);
        }, 2400);
      }

      function fmtMoney(value) {
        return (Number(value) || 0).toLocaleString("vi-VN") + "đ";
      }

      function fmtDate(raw) {
        if (typeof raw === "string") {
          if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
            const [y, m, d] = raw.split("-");
            return `${d}/${m}/${y}`;
          }
          const dt = new Date(raw);
          if (!Number.isNaN(dt.getTime()))
            return dt.toLocaleDateString("vi-VN");
        }

        if (raw && typeof raw.toDate === "function") {
          return raw.toDate().toLocaleDateString("vi-VN");
        }

        return "-";
      }

      function nowTimelineStamp() {
        return new Date().toLocaleDateString("vi-VN", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function buildTimelineForStatus(status) {
        const stamp = nowTimelineStamp();

        if (status === "Đã hủy") {
          return [
            { step: "Đặt hàng", done: true, current: false, time: stamp },
            {
              step: "Đã hủy",
              done: true,
              current: true,
              cancelled: true,
              time: stamp,
            },
          ];
        }

        return [
          {
            step: "Đặt hàng",
            done: true,
            current: status === "Chờ xác nhận",
            time: stamp,
          },
          {
            step: "Đã xác nhận",
            done: [
              "Đã xác nhận",
              "Đang giao hàng",
              "Đã giao hàng thành công",
            ].includes(status),
            current: status === "Đã xác nhận",
            time: status === "Đã xác nhận" ? stamp : "",
          },
          {
            step: "Đang giao hàng",
            done: ["Đang giao hàng", "Đã giao hàng thành công"].includes(
              status,
            ),
            current: status === "Đang giao hàng",
            time: status === "Đang giao hàng" ? stamp : "",
          },
          {
            step: "Đã giao hàng thành công",
            done: status === "Đã giao hàng thành công",
            current: status === "Đã giao hàng thành công",
            time: status === "Đã giao hàng thành công" ? stamp : "",
          },
        ];
      }

      function normalizeItems(items) {
        if (!Array.isArray(items)) return [];
        return items.map((item) => ({
          name: item?.name || "Sản phẩm",
          qty: Number(item?.qty || item?.quantity) || 1,
        }));
      }

      function getOrderTotal(order) {
        const explicitTotal = Number(order.total);
        if (explicitTotal > 0) return explicitTotal;

        const subtotal = Number(order.subtotal) || 0;
        const shipping = Number(order.shipping) || 0;
        const discount = Number(order.discount) || 0;
        return Math.max(0, subtotal + shipping - discount);
      }

      function getPaymentMethod(order) {
        return (
          order.payment?.method ||
          order.paymentMethod ||
          "Tiền mặt khi nhận hàng"
        );
      }

      function getPaymentStatus(order) {
        return order.payment?.status || order.paymentStatus || "Chờ xác nhận";
      }

      function filterOrdersByStatus() {
        const selectedStatus = statusFilter.value.trim();
        let filteredOrders = allOrders;

        if (selectedStatus) {
          filteredOrders = allOrders.filter(
            (order) => order.status === selectedStatus,
          );
          filterResult.textContent = `Hiển thị ${filteredOrders.length} đơn hàng`;
        } else {
          filterResult.textContent = "";
        }

        renderOrders(filteredOrders);
      }

      function renderOrders(orders) {
        if (!orders.length) {
          ordersBody.innerHTML =
            '<tr class="empty-row"><td colspan="8">Chưa có đơn hàng nào.</td></tr>';
          return;
        }

        ordersBody.innerHTML = orders
          .map((order, index) => {
            const customerName = order.customer || order.name || "Khách hàng";
            const orderCode = order.orderCode || order.id;
            const customerPhone =
              order.phone ||
              order.phoneNumber ||
              order.mobile ||
              "Chưa có số điện thoại";
            const customerAddress =
              order.addressText ||
              order.address ||
              [order.ward, order.district, order.province]
                .filter(Boolean)
                .join(", ") ||
              "Chưa có địa chỉ";
            const paymentMethod = getPaymentMethod(order);
            const paymentStatus = getPaymentStatus(order);
            const items = normalizeItems(order.items);
            const itemsHtml = items.length
              ? `<ul class="items-list">${items.map((item) => `<li>${item.name} x${item.qty}</li>`).join("")}</ul>`
              : '<span class="customer-meta">Không có sản phẩm</span>';

            const statusOptions = STATUS_OPTIONS.map(
              (status) =>
                `<option value="${status}" ${status === order.status ? "selected" : ""}>${status}</option>`,
            ).join("");

            return `
            <tr>
                <td>${index + 1}</td>
                <td><span class="order-code">${orderCode || "-"}</span></td>
                <td class="customer-cell">
                    <div class="customer-name">${customerName}</div>
                  <span class="customer-meta">Email: ${order.email || "Chưa có email"}</span>
                  <span class="customer-meta">SĐT: ${customerPhone}</span>
                  <span class="customer-meta">Địa chỉ: ${customerAddress}</span>
                </td>
                <td>${fmtDate(order.date || order.createdAt)}</td>
                <td class="payment-info">
                    <span class="payment-method">${paymentMethod}</span>
                    <span class="payment-status">${paymentStatus}</span>
                </td>
                <td>
                    <select class="status-select" data-id="${order.id}">${statusOptions}</select>
                </td>
                <td class="items-cell">${itemsHtml}</td>
                <td><span class="total-price">${fmtMoney(getOrderTotal(order))}</span></td>
            </tr>
        `;
          })
          .join("");

        document.querySelectorAll(".status-select").forEach((selectElem) => {
          selectElem.addEventListener("change", async (event) => {
            const orderId = event.target.dataset.id;
            const newStatus = event.target.value;
            event.target.disabled = true;

            try {
              await db
                .collection("orders")
                .doc(orderId)
                .set(
                  {
                    status: newStatus,
                    timeline: buildTimelineForStatus(newStatus),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                  },
                  { merge: true },
                );

              showToast("Đã cập nhật trạng thái đơn hàng");
            } catch (error) {
              console.error("Cập nhật trạng thái thất bại:", error);
              showToast("Không thể cập nhật trạng thái", true);
            } finally {
              event.target.disabled = false;
            }
          });
        });
      }

      function subscribeOrdersRealtime() {
        showStatus("Đang đồng bộ đơn hàng từ Firestore realtime...");

        db.collection("orders")
          .orderBy("createdAt", "desc")
          .onSnapshot(
            (snapshot) => {
              allOrders = snapshot.docs.map((doc) => ({
                id: doc.id,
                ...doc.data(),
              }));

              // Reset filter when data updates
              statusFilter.value = "";
              filterResult.textContent = "";

              renderOrders(allOrders);

              const nowText = new Date().toLocaleString("vi-VN");
              updatedAtText.textContent = `Đã đồng bộ lúc: ${nowText} | Tổng đơn: ${allOrders.length}`;
              showStatus(`Đang hiển thị ${allOrders.length} đơn hàng.`);
            },
            (error) => {
              console.error("Không thể tải đơn hàng:", error);
              showStatus(
                getPermissionErrorMessage(
                  error,
                  "Lỗi khi kết nối Firestore. Vui lòng kiểm tra quyền đọc collection orders.",
                ),
                true,
              );
              ordersBody.innerHTML =
                '<tr class="empty-row"><td colspan="8">Không thể tải dữ liệu đơn hàng.</td></tr>';
            },
          );
      }

      async function ensureAdminAccess(user) {
        if (!user) return false;

        const idTokenResult = await user.getIdTokenResult(true);
        if (
          idTokenResult?.claims?.admin === true ||
          idTokenResult?.claims?.role === "admin"
        ) {
          return true;
        }

        try {
          const userDoc = await db.collection("users").doc(user.uid).get();
          return userDoc.exists && userDoc.data()?.role === "admin";
        } catch {
          return false;
        }
      }

      auth.onAuthStateChanged(async (user) => {
        if (!user) {
          showStatus("Bạn cần đăng nhập admin trước khi xem đơn hàng.", true);
          ordersBody.innerHTML =
            '<tr class="empty-row"><td colspan="8">Bạn chưa đăng nhập admin.</td></tr>';
          setTimeout(() => {
            window.location.href = "login.html";
          }, 900);
          return;
        }

        showStatus("Đang kiểm tra quyền admin...");

        let isAdmin = false;
        try {
          isAdmin = await ensureAdminAccess(user);
        } catch (error) {
          console.error("Lỗi kiểm tra quyền admin:", error);
        }

        if (!isAdmin) {
          showStatus(
            "Tài khoản này không có quyền admin để xem đơn hàng.",
            true,
          );
          ordersBody.innerHTML =
            '<tr class="empty-row"><td colspan="8">Tài khoản hiện tại không có quyền admin.</td></tr>';
          showToast("Tài khoản không có quyền admin", true);
          return;
        }

        subscribeOrdersRealtime();
      });
    </script>
  </body>
</html>
