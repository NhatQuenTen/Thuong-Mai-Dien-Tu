<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - MobiStore Admin</title>

    <!-- Font + Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-card: #1a1f35;
            --bg-input: #151b30;
            --accent: #7c3aed;
            --accent2: #06b6d4;
            --text: #f1f5f9;
            --text2: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* BACKGROUND */
        .bg-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
        }

        .orb-1 {
            background: #7c3aed;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            background: #06b6d4;
            bottom: -100px;
            right: -100px;
        }

        /* WRAPPER */
        .login-wrapper {
            display: flex;
            width: 1000px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(26, 31, 53, 0.6);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        /* LEFT */
        .login-branding {
            flex: 1;
            padding: 40px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(6, 182, 212, 0.1));
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .brand-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .brand-logo-text {
            font-size: 20px;
            font-weight: 800;
        }

        .brand-title {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .highlight {
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-desc {
            color: var(--text2);
        }

        /* RIGHT */
        .login-form-panel {
            flex: 1;
            padding: 40px;
        }

        .form-container {
            max-width: 350px;
        }

        .form-title {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .form-subtitle {
            color: var(--text2);
            margin-bottom: 20px;
        }

        /* INPUT */
        .input-group {
            margin-bottom: 15px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 12px;
            color: var(--text2);
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background: var(--bg-input);
            border: none;
            border-radius: 8px;
            color: white;
        }

        /* TOGGLE */
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 10px;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
        }

        /* BUTTON */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            border: none;
            border-radius: 8px;
            color: white;
            margin-top: 15px;
            cursor: pointer;
        }

        .login-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<!-- Background -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="login-wrapper">

    <!-- LEFT -->
    <div class="login-branding">
        <div class="brand-logo">
            <div class="brand-logo-icon">
                <i class="fas fa-mobile-alt"></i>
            </div>
            <span class="brand-logo-text">MobiStore</span>
        </div>

        <div class="brand-title">
            Trang Quản Trị <br>
            <span class="highlight">Cửa Hàng</span>
        </div>

        <p class="brand-desc">
            Quản lý sản phẩm, đơn hàng và khách hàng dễ dàng.
        </p>
    </div>

    <!-- RIGHT -->
    <div class="login-form-panel">
        <div class="form-container">

            <div class="form-title">Đăng nhập Admin</div>
            <div class="form-subtitle">Nhập thông tin để tiếp tục</div>

            <form id="loginForm">
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="text" id="emailInput" placeholder="admin@mobistore.vn">
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="passwordInput" placeholder="Mật khẩu">
                        <button type="button" class="toggle-password" onclick="togglePass()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn">Đăng Nhập</button>
            </form>

        </div>
    </div>

</div>

<script>
function togglePass() {
    const pass = document.getElementById("passwordInput");
    pass.type = pass.type === "password" ? "text" : "password";
}

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("emailInput").value;
    const pass = document.getElementById("passwordInput").value;

    if(email === "admin@gmail.com" && pass === "123456"){
        alert("Đăng nhập thành công!");
        window.location.href = "admin.html";
    } else {
        alert("Sai tài khoản!");
    }
});
</script>

</body>
</html>
